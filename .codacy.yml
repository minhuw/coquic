---
engines:
  cppcheck:
    language: c++
    exclude_paths:
      - "include/**/*.h"
      - "src/**/*.h"
      - "tests/**/*.h"
  duplication:
    exclude_paths:
      - "bench/**"
      - "demo/**"
      - "docs/**"
      - "tests/**"
      - "tools/rag/tests/**"
  lizard:
    exclude_paths:
      - "**/*"
  metric:
    exclude_paths:
      - "bench/**"
      - "demo/**"
      - "docs/**"
      - "rag/tests/**"
      - "tests/**"
      - "tools/rag/tests/**"
  opengrep:
    exclude_paths:
      - "bindings/rust/coquic/src/ffi.rs"
      - "bindings/rust/coquic/src/http3.rs"
      - "bindings/rust/coquic/src/lib.rs"
  prospector:
    exclude_paths:
      - "rag/**"
      - "scripts/**"
      - "tests/**"

exclude_paths:
  - ".agents/**"
  - "bench/**"
  - "bindings/rust/**/target/**"
  - "docs/references/**"
  - "docs/rfc/**"
  - "docs/superpowers/**"
  - "site/next/package-lock.json"
  - "site/next/public/**"
  - "rag/tests/**"
  - "tests/**"
  - "tools/rag/tests/**"

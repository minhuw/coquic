'$schema' = "https://awslabs.github.io/duvet/config/v0.4.0.json"

[[source]]
pattern = "src/**/*.cpp"
comment-style = { content = "// #" }

[[source]]
pattern = "src/**/*.h"
comment-style = { content = "// #" }

[[source]]
pattern = "include/**/*.h"
comment-style = { content = "// #" }

[[source]]
pattern = "tests/**/*.cpp"
type = "test"
comment-style = { content = "// #" }

[[source]]
pattern = "tests/**/*.h"
type = "test"
comment-style = { content = "// #" }

[[source]]
pattern = "interop/**/*.cpp"
type = "test"
comment-style = { content = "// #" }

[[source]]
pattern = "interop/**/*.h"
type = "test"
comment-style = { content = "// #" }

[[source]]
pattern = "fuzz/**/*.cpp"
type = "test"
comment-style = { content = "// #" }

[[source]]
pattern = "fuzz/**/*.h"
type = "test"
comment-style = { content = "// #" }


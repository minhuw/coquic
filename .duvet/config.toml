[report.html]
enabled = true
path = ".duvet/reports/report.html"
issue-link = "https://github.com/minhuw/coquic/issues"
blob-link = "https://github.com/minhuw/coquic/blob/${{ SHA || GITHUB_SHA || 'main' }}"

[report.json]
enabled = true
path = ".duvet/reports/report.json"

[report.snapshot]
enabled = true
path = ".duvet/snapshot.txt"

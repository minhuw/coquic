target = "https://www.rfc-editor.org/rfc/rfc9204#section-4.5.4"
# report-id = 1044
quote = '''
When
the 'N' bit is set, the encoded field line MUST always be encoded
with a literal representation.
'''
tracking-issue = "https://github.com/minhuw/coquic/issues/62"
reason = '''
The current HTTP/3 field model stores name/value pairs without preserving QPACK literal never-index metadata, so N-bit forwarding and intermediary re-encoding requirements need implementation or explicit unsupported-status documentation.
'''
tags = ["rfc9204"]


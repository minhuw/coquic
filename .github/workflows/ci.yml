name: CI

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: Format, Lint, Build, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Format Check
        run: nix develop -c pre-commit run clang-format --all-files --show-diff-on-failure

      - name: Lint
        run: nix develop -c pre-commit run coquic-clang-tidy --all-files --show-diff-on-failure

      - name: Build
        run: nix develop -c zig build

      - name: Test
        run: nix develop -c zig build coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          use_oidc: true

      - name: Upload Coverage Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-coverage
          path: |
            coverage/html
            coverage/lcov.info

name: Per-Commit CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f
        with:
          summarize: false

      - name: Format Check
        run: nix develop -c pre-commit run clang-format --all-files --show-diff-on-failure

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f
        with:
          summarize: false

      - name: Lint
        env:
          COQUIC_CLANG_TIDY_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          COQUIC_CLANG_TIDY_DIFF_HEAD: ${{ github.sha }}
        run: |
          if [ "${COQUIC_CLANG_TIDY_DIFF_BASE}" = "0000000000000000000000000000000000000000" ]; then
            COQUIC_CLANG_TIDY_DIFF_BASE="$(git rev-parse HEAD^)"
            export COQUIC_CLANG_TIDY_DIFF_BASE
          fi
          nix develop .#lint -c ./scripts/run-clang-tidy.sh --diff

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-cpp:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: none
          queries: +security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"

  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: +security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

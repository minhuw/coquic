name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "31 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-cpp:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f

      - name: Prepare Nix Shell
        run: nix develop -c true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: +security-extended,security-and-quality

      - name: Build
        run: nix develop -c zig build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"

  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: +security-extended,security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

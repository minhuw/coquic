name: Deploy Demo

concurrency:
  group: deploy-demo
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - demo/**
      - src/**
      - build.zig
      - build.zig.zon
      - flake.nix
      - flake.lock
      - docker/h3-server/Dockerfile
      - .github/workflows/deploy-demo.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-demo:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210

      - name: Build h3-server
        run: nix develop .#quictls-musl -c zig build -Dtls_backend=quictls -Dtarget=x86_64-linux-musl -Dspdlog_shared=false

      - name: Package demo site
        run: demo/deploy/package-demo.sh "${RUNNER_TEMP}/demo-site"

      - name: Configure SSH
        env:
          COQUIC_DEMO_REMOTE_SSH_KEY: ${{ secrets.COQUIC_DEMO_REMOTE_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "${COQUIC_DEMO_REMOTE_SSH_KEY}" > "${RUNNER_TEMP}/coquic-demo.key"
          cat > "${HOME}/.ssh/known_hosts" <<'EOF'
          coquic.minhuw.dev ssh-rsa 
          coquic.minhuw.dev ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCjTT5KdjyCQ3G04Z8mUUOkXAqsdDuU4K5bB3jXi5B3aIzYK+2f0TT0XE3G0/r/KmZoSHYxb21TtjykFa47XFSA=
          coquic.minhuw.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILi5VjtrGcYlzyYEXd4/PzQJXBjZ028DA6nJ7Xu50CJh
          EOF
          chmod 600 "${RUNNER_TEMP}/coquic-demo.key" "${HOME}/.ssh/known_hosts"

      - name: Deploy demo
        env:
          COQUIC_DEMO_CERT_CHAIN_PEM: ${{ secrets.COQUIC_DEMO_CERT_CHAIN_PEM }}
          COQUIC_DEMO_PRIVATE_KEY_PEM: ${{ secrets.COQUIC_DEMO_PRIVATE_KEY_PEM }}
        run: demo/deploy/deploy-remote.sh "$(pwd)/zig-out/bin/h3-server" "${RUNNER_TEMP}/demo-site"

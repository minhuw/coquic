name: Interop

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  interop-quicgo:
    name: quic-go Official Runner
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify Workflow Contract
        run: bash tests/nix/github_interop_workflow_test.sh

      - name: Run Official quic-go Interop Tests
        env:
          INTEROP_TESTCASES: handshake,handshakeloss,transfer,transferloss,handshakecorruption,transfercorruption,chacha20,longrtt
        run: nix develop -c bash tests/nix/interop_runner_test.sh

      - name: Upload Interop Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs
          path: .interop-logs/official
          if-no-files-found: warn

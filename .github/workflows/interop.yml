name: Interop

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  INTEROP_ALL_TESTCASES: handshake,transfer,longrtt,chacha20,multiplexing,retry,resumption,zerortt,http3,blackhole,keyupdate,ecn,amplificationlimit,handshakeloss,transferloss,handshakecorruption,transfercorruption,ipv6,v2,rebind-port,rebind-addr,connectionmigration,goodput,crosstraffic

jobs:
  interop-peer:
    name: ${{ matrix.display_name }} Official Runner
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - peer: quicgo
            display_name: quic-go
            impl: quic-go
            image: martenseemann/quic-go-interop@sha256:919f70ed559ccffaeadf884b864a406b0f16d2bd14a220507e83cc8d699c4424
          - peer: picoquic
            display_name: picoquic
            impl: picoquic
            image: privateoctopus/picoquic@sha256:7e4110e3260cd9d4f815ad63ca1d93e020e94d3a8d3cb6cb9cc5c59d97999b05
          - peer: quinn
            display_name: quinn
            impl: quinn
            image: stammw/quinn-interop@sha256:5205c84e200ef1a999be602ed6eeec9a216f25ce27d5eac690fa1540ec73f355
          - peer: msquic
            display_name: msquic
            impl: msquic
            image: ghcr.io/microsoft/msquic/qns:main
          - peer: quiche
            display_name: quiche
            impl: quiche
            image: cloudflare/quiche-qns:latest
          - peer: ngtcp2
            display_name: ngtcp2
            impl: ngtcp2
            image: ghcr.io/ngtcp2/ngtcp2-interop:latest
          - peer: neqo
            display_name: neqo
            impl: neqo
            image: ghcr.io/mozilla/neqo-qns:latest
          - peer: mvfst
            display_name: mvfst
            impl: mvfst
            image: ghcr.io/facebook/proxygen/mvfst-interop:latest
          - peer: aioquic
            display_name: aioquic
            impl: aioquic
            image: aiortc/aioquic-qns:latest
          - peer: xquic
            display_name: xquic
            impl: xquic
            image: ghcr.io/alibaba/xquic/xquic-interop:latest
          - peer: s2n-quic
            display_name: s2n-quic
            impl: s2n-quic
            image: ghcr.io/aws/s2n-quic/s2n-quic-qns:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f
        with:
          summarize: false

      # Remove this when GitHub runner gets docker engine >= v28.1.0.
      - uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23
        with:
          version: version=v28.3.0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Enable IPv6 support
        run: sudo modprobe ip6table_filter

      - name: Install Wireshark
        run: |
          sudo add-apt-repository ppa:wireshark-dev/nightly
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tshark

      - name: Show Docker Version
        run: |
          docker version
          docker compose version

      - name: Run Official ${{ matrix.display_name }} Interop Tests
        id: run_interop
        continue-on-error: true
        env:
          INTEROP_TESTCASES: ${{ env.INTEROP_ALL_TESTCASES }}
          INTEROP_COQUIC_SERVER_TESTCASES: ${{ env.INTEROP_ALL_TESTCASES }}
          INTEROP_COQUIC_CLIENT_TESTCASES: ${{ env.INTEROP_ALL_TESTCASES }}
          INTEROP_PEER_IMPL: ${{ matrix.impl }}
          INTEROP_PEER_IMAGE: ${{ matrix.image }}
          INTEROP_DIRECTIONS: both
          COQUIC_CONGESTION_CONTROL: ${{ matrix.congestion_control || '' }}
        run: bash interop/run-official.sh

      - name: Publish ${{ matrix.display_name }} Interop Summary
        if: always()
        run: |
          python3 scripts/render-interop-results.py \
            --result "${{ matrix.peer }}-server=.interop-logs/official/coquic_${{ matrix.impl }}/results.json" \
            --result "${{ matrix.peer }}-client=.interop-logs/official/${{ matrix.impl }}_coquic/results.json" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --commit "${GITHUB_SHA}" \
            --json-out .interop-logs/interop-results-${{ matrix.peer }}.json >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Interop Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs-${{ matrix.peer }}
          path: .interop-logs/official
          if-no-files-found: warn

      - name: Upload Interop Result Snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-results-${{ matrix.peer }}
          path: .interop-logs/interop-results-${{ matrix.peer }}.json
          if-no-files-found: error

  interop-self:
    name: Self Official Runner
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f
        with:
          summarize: false

      # Remove this when GitHub runner gets docker engine >= v28.1.0.
      - uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23
        with:
          version: version=v28.3.0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Enable IPv6 support
        run: sudo modprobe ip6table_filter

      - name: Install Wireshark
        run: |
          sudo add-apt-repository ppa:wireshark-dev/nightly
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tshark

      - name: Show Docker Version
        run: |
          docker version
          docker compose version

      - name: Run Official self Interop Tests
        id: run_interop
        continue-on-error: true
        env:
          INTEROP_TESTCASES: ${{ env.INTEROP_ALL_TESTCASES }}
          INTEROP_PEER_IMPL: coquic
          INTEROP_PEER_IMAGE: coquic-interop:quictls-musl
          INTEROP_DIRECTIONS: coquic-server
        run: bash interop/run-official.sh

      - name: Publish self Interop Summary
        if: always()
        run: |
          python3 scripts/render-interop-results.py \
            --result self=.interop-logs/official/coquic_coquic/results.json \
            --event-name "${GITHUB_EVENT_NAME}" \
            --commit "${GITHUB_SHA}" \
            --json-out .interop-logs/interop-results-self.json >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Interop Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs-self
          path: .interop-logs/official
          if-no-files-found: warn

      - name: Upload Interop Result Snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-results-self
          path: .interop-logs/interop-results-self.json
          if-no-files-found: error

  publish-interop-results:
    name: Publish Interop Results
    runs-on: ubuntu-latest
    needs:
      - interop-peer
      - interop-self
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Interop Result Snapshots
        uses: actions/download-artifact@v4
        with:
          pattern: interop-results-*
          path: .interop-results/downloaded
          merge-multiple: true

      - name: Merge Interop Result Snapshot
        run: |
          python3 scripts/render-interop-results.py \
            --result quicgo-server=.interop-results/downloaded/interop-results-quicgo.json \
            --result picoquic-server=.interop-results/downloaded/interop-results-picoquic.json \
            --result quinn-server=.interop-results/downloaded/interop-results-quinn.json \
            --result msquic-server=.interop-results/downloaded/interop-results-msquic.json \
            --result quiche-server=.interop-results/downloaded/interop-results-quiche.json \
            --result ngtcp2-server=.interop-results/downloaded/interop-results-ngtcp2.json \
            --result neqo-server=.interop-results/downloaded/interop-results-neqo.json \
            --result mvfst-server=.interop-results/downloaded/interop-results-mvfst.json \
            --result aioquic-server=.interop-results/downloaded/interop-results-aioquic.json \
            --result xquic-server=.interop-results/downloaded/interop-results-xquic.json \
            --result s2n-quic-server=.interop-results/downloaded/interop-results-s2n-quic.json \
            --result self=.interop-results/downloaded/interop-results-self.json \
            --event-name "${GITHUB_EVENT_NAME}" \
            --commit "${GITHUB_SHA}" \
            --require-complete-sources \
            --json-out .interop-results/interop-results.json >> "${GITHUB_STEP_SUMMARY}"

      - name: Configure Demo SSH
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          COQUIC_DEMO_REMOTE_SSH_KEY: ${{ secrets.COQUIC_DEMO_REMOTE_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "${COQUIC_DEMO_REMOTE_SSH_KEY}" > "${RUNNER_TEMP}/coquic-demo.key"
          cat > "${HOME}/.ssh/known_hosts" <<'EOF'
          coquic.minhuw.dev ssh-rsa 
          coquic.minhuw.dev ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCjTT5KdjyCQ3G04Z8mUUOkXAqsdDuU4K5bB3jXi5B3aIzYK+2f0TT0XE3G0/r/KmZoSHYxb21TtjykFa47XFSA=
          coquic.minhuw.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILi5VjtrGcYlzyYEXd4/PzQJXBjZ028DA6nJ7Xu50CJh
          EOF
          chmod 600 "${RUNNER_TEMP}/coquic-demo.key" "${HOME}/.ssh/known_hosts"

      - name: Upload Interop Results To Demo
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          if [ ! -f .interop-results/interop-results.json ]; then
            echo "missing .interop-results/interop-results.json" >&2
            exit 1
          fi
          scp \
            -P 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            .interop-results/interop-results.json \
            minhuw@coquic.minhuw.dev:/tmp/coquic-interop-results.json
          ssh \
            -p 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            minhuw@coquic.minhuw.dev \
            "sudo install -m 644 /tmp/coquic-interop-results.json /opt/coquic-demo/current/app/public/interop-results.json && rm -f /tmp/coquic-interop-results.json"

      - name: Fail On Interop Matrix Creation Errors
        if: always()
        run: |
          failed=0
          check_job() {
            local label="$1"
            local result="$2"
            if [ "${result}" != "success" ]; then
              echo "${label} job finished with result: ${result}" >&2
              failed=1
            fi
          }
          check_job "interop-peer" "${{ needs.interop-peer.result }}"
          check_job "interop-self" "${{ needs.interop-self.result }}"
          exit "${failed}"

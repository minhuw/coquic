name: Interop

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  interop-quicgo:
    name: quic-go Official Runner
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify Workflow Contract
        run: bash tests/nix/github_interop_workflow_test.sh

      - name: Run Official quic-go Interop Tests
        env:
          INTEROP_TESTCASES: handshake,handshakeloss,transfer,transferloss,handshakecorruption,transfercorruption,chacha20,longrtt,goodput,crosstraffic
          INTEROP_PEER_IMPL: quic-go
          INTEROP_PEER_IMAGE: martenseemann/quic-go-interop@sha256:919f70ed559ccffaeadf884b864a406b0f16d2bd14a220507e83cc8d699c4424
        run: nix develop -c bash tests/nix/interop_runner_test.sh

      - name: Upload Interop Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs-quicgo
          path: .interop-logs/official
          if-no-files-found: warn

  interop-picoquic:
    name: picoquic Official Runner
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify Workflow Contract
        run: bash tests/nix/github_interop_workflow_test.sh

      - name: Run Official picoquic Interop Tests
        env:
          INTEROP_TESTCASES: handshake,handshakeloss,transfer,transferloss,handshakecorruption,transfercorruption,chacha20,longrtt,goodput,crosstraffic
          INTEROP_PEER_IMPL: picoquic
          INTEROP_PEER_IMAGE: privateoctopus/picoquic:latest
        run: nix develop -c bash tests/nix/interop_runner_test.sh

      - name: Upload Interop Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs-picoquic
          path: .interop-logs/official
          if-no-files-found: warn

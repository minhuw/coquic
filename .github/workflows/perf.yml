name: Perf

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-config:
    name: Check Perf Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Perf Configuration
        run: python3 scripts/check-bench-implementations.py

  perf-impl:
    name: ${{ matrix.display_name }} Perf
    runs-on:
      - self-hosted
      - Linux
      - X64
      - coquic-perf
    needs:
      - perf-config
    timeout-minutes: 120
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        sandbox = true
        build-users-group =
        max-jobs = 8
        cores = 8
      PERF_SERVER_CPUS: 8
      PERF_CLIENT_CPUS: 9
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: coquic
            display_name: CoQUIC
            client_impl: coquic
            server_impl: coquic
            congestion_controls: newreno cubic bbr copa
            image_attr: perf-image-coquic-boringssl-musl
            image_tag: coquic-perf-coquic:boringssl-musl
          - label: coquic-rust
            display_name: CoQUIC Rust
            client_impl: coquic-rust
            server_impl: coquic-rust
            congestion_controls: newreno cubic bbr copa
            image_attr: perf-image-coquic-rust-boringssl-musl
            image_tag: coquic-perf-coquic-rust:boringssl-musl
          - label: coquic-python
            display_name: CoQUIC Python
            client_impl: coquic-python
            server_impl: coquic-python
            congestion_controls: newreno cubic bbr copa
            image_attr: perf-image-coquic-python-boringssl-musl
            image_tag: coquic-perf-coquic-python:boringssl-musl
          - label: coquic-go
            display_name: CoQUIC Go
            client_impl: coquic-go
            server_impl: coquic-go
            congestion_controls: newreno cubic bbr copa
            image_attr: perf-image-coquic-go-boringssl-musl
            image_tag: coquic-perf-coquic-go:boringssl-musl
          - label: coquic-js
            display_name: CoQUIC JavaScript
            client_impl: coquic-js
            server_impl: coquic-js
            congestion_controls: newreno cubic bbr copa
            image_attr: perf-image-coquic-js-boringssl-musl
            image_tag: coquic-perf-coquic-js:boringssl-musl
          - label: quic-go
            display_name: quic-go
            client_impl: quic-go
            server_impl: quic-go
            congestion_controls: default
            image_attr: perf-image-quic-go-quictls-musl
            image_tag: coquic-perf-quic-go:quictls-musl
          - label: quinn
            display_name: quinn
            client_impl: quinn
            server_impl: quinn
            congestion_controls: default
            image_attr: perf-image-quinn-quictls-musl
            image_tag: coquic-perf-quinn:quictls-musl
          - label: picoquic
            display_name: picoquic
            client_impl: picoquic
            server_impl: picoquic
            congestion_controls: default
            image_attr: perf-image-picoquic-quictls-musl
            image_tag: coquic-perf-picoquic:quictls-musl
          - label: msquic
            display_name: MSQUIC
            client_impl: msquic
            server_impl: msquic
            congestion_controls: default
            image_attr: perf-image-msquic-quictls-musl
            image_tag: coquic-perf-msquic:quictls-musl
          - label: quiche
            display_name: quiche
            client_impl: quiche
            server_impl: quiche
            congestion_controls: default
            image_attr: perf-image-quiche-quictls-musl
            image_tag: coquic-perf-quiche:quictls-musl
          - label: quicly
            display_name: quicly
            client_impl: quicly
            server_impl: quicly
            congestion_controls: default
            image_attr: perf-image-quicly-quictls-musl
            image_tag: coquic-perf-quicly:quictls-musl
          - label: google-quiche
            display_name: Google QUICHE
            client_impl: google-quiche
            server_impl: google-quiche
            congestion_controls: default
            image_attr: perf-image-google-quiche-quictls-musl
            image_tag: coquic-perf-google-quiche:quictls-musl
          - label: tquic
            display_name: TQUIC
            client_impl: tquic
            server_impl: tquic
            congestion_controls: default
            image_attr: perf-image-tquic-quictls-musl
            image_tag: coquic-perf-tquic:quictls-musl
          - label: mvfst
            display_name: mvfst
            client_impl: mvfst
            server_impl: mvfst
            congestion_controls: default
            image_attr: perf-image-mvfst-quictls-musl
            image_tag: coquic-perf-mvfst:quictls-musl
          - label: s2n-quic
            display_name: s2n-quic
            client_impl: s2n-quic
            server_impl: s2n-quic
            congestion_controls: default
            image_attr: perf-image-s2n-quic-quictls-musl
            image_tag: coquic-perf-s2n-quic:quictls-musl
          - label: xquic
            display_name: xquic
            client_impl: xquic
            server_impl: xquic
            congestion_controls: default
            image_attr: perf-image-xquic-quictls-musl
            image_tag: coquic-perf-xquic:quictls-musl
          - label: aioquic
            display_name: aioquic
            client_impl: aioquic
            server_impl: aioquic
            congestion_controls: default
            image_attr: perf-image-aioquic-quictls-musl
            image_tag: coquic-perf-aioquic:quictls-musl
          - label: ngtcp2
            display_name: ngtcp2
            client_impl: ngtcp2
            server_impl: ngtcp2
            congestion_controls: default
            image_attr: perf-image-ngtcp2-quictls-musl
            image_tag: coquic-perf-ngtcp2:quictls-musl
          - label: lsquic
            display_name: LSQUIC
            client_impl: lsquic
            server_impl: lsquic
            congestion_controls: default
            image_attr: perf-image-lsquic-quictls-musl
            image_tag: coquic-perf-lsquic:quictls-musl
          - label: neqo
            display_name: Neqo
            client_impl: neqo
            server_impl: neqo
            congestion_controls: default
            image_attr: perf-image-neqo-quictls-musl
            image_tag: coquic-perf-neqo:quictls-musl

    steps:
      - name: Reclaim Perf Runner State
        run: |
          set -euo pipefail
          df -h
          rm -rf .bench-results result
          if docker info >/dev/null 2>&1; then
            docker system prune -af --volumes || true
            docker builder prune -af || true
            docker_root="$(docker info --format '{{.DockerRootDir}}' 2>/dev/null || true)"
            if [ -n "${docker_root}" ] && [ -d "${docker_root}/tmp" ]; then
              find "${docker_root}/tmp" -mindepth 1 -maxdepth 1 -mtime +0 -exec rm -rf {} +
            fi
          fi
          rm -rf "${TMPDIR:-/tmp}/nix-build-"* /tmp/nix-build-* /tmp/docker-export-*
          if command -v nix >/dev/null 2>&1; then
            nix store gc || nix-collect-garbage -d || true
          fi
          available_kb="$(df -Pk "${RUNNER_TEMP:-/tmp}" | awk 'NR == 2 { print $4 }')"
          if [ "${available_kb}" -lt 10485760 ]; then
            echo "Perf runner has less than 10 GiB available after cleanup" >&2
            exit 1
          fi
          df -h

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Nix Build Parallelism
        run: |
          mkdir -p "${HOME}/.config/nix"
          {
            echo 'experimental-features = nix-command flakes'
            echo 'sandbox = true'
            echo 'build-users-group ='
            echo 'max-jobs = 8'
            echo 'cores = 8'
          } > "${HOME}/.config/nix/nix.conf"

      - name: Show Docker Version
        run: |
          docker version

      - name: Check Perf Profiling Tools
        run: |
          set -euo pipefail
          tools_path="$(nix build --no-link --print-out-paths .#perf-profile-tools)"
          printf "%s/bin\n" "${tools_path}" >> "${GITHUB_PATH}"
          perf_bin="${tools_path}/bin/perf"
          if [ ! -x "${perf_bin}" ]; then
            echo "perf is required for PERF_PROFILE_FLAMEGRAPHS=1" >&2
            exit 1
          fi
          echo "perf: ${perf_bin}"
          "${perf_bin}" --version
          if ! sudo -n true >/dev/null 2>&1; then
            echo "passwordless sudo is required for host perf profiling" >&2
            exit 1
          fi
          if ! sudo -n "${perf_bin}" --version >/dev/null 2>&1; then
            echo "passwordless sudo cannot execute ${perf_bin}" >&2
            exit 1
          fi
          printf "PERF_PROFILE_PERF_BIN=%s\n" "${perf_bin}" >> "${GITHUB_ENV}"
          "${tools_path}/bin/stackcollapse-perf.pl" --help >/dev/null 2>&1 || true
          "${tools_path}/bin/flamegraph.pl" --help >/dev/null 2>&1 || true
          echo "flamegraph: ${tools_path}/bin/flamegraph.pl"
          profile_image_path="$(nix build --no-link --print-out-paths .#perf-profile-image)"
          profile_image_tar="${profile_image_path}"
          if [ -d "${profile_image_path}" ]; then
            profile_image_tar="${profile_image_path}/image.tar.gz"
          fi
          docker load -i "${profile_image_tar}" >/dev/null
          profile_image="coquic-perf-profile-recorder:latest"
          docker image inspect "${profile_image}" >/dev/null
          docker run --rm --privileged --pid=host "${profile_image}" --version
          printf "PERF_PROFILE_DOCKER_IMAGE=%s\n" "${profile_image}" >> "${GITHUB_ENV}"
          echo "perf profile image: ${profile_image}"

      - name: Run ${{ matrix.display_name }} Perf CI Matrix
        id: run_perf
        continue-on-error: true
        env:
          PERF_RESULTS_ROOT: .bench-results/${{ matrix.label }}
          PERF_CLIENT_IMPL: ${{ matrix.client_impl }}
          PERF_SERVER_IMPL: ${{ matrix.server_impl }}
          PERF_IMPLEMENTATIONS_JSON: bench/implementations.json
          PERF_CONGESTION_CONTROLS: ${{ matrix.congestion_controls }}
          PERF_IMAGE_ATTR: ${{ matrix.image_attr }}
          PERF_IMAGE_TAG: ${{ matrix.image_tag }}
          PERF_UTILIZATION_ENABLED: "1"
          PERF_PROFILE_FLAMEGRAPHS: "1"
          PERF_PROFILE_FREQUENCY: "49"
          PERF_PROFILE_USE_SUDO: "1"
          PERF_RUN_TIMEOUT_SECONDS: "180"
        run: bash bench/run-host-matrix.sh --preset ci

      - name: Publish ${{ matrix.display_name }} Perf Summary
        if: always()
        run: |
          python3 scripts/render-perf-comparison.py \
            --manifest "${{ matrix.label }}=.bench-results/${{ matrix.label }}/manifest.json" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --commit "${GITHUB_SHA}" \
            --json-out ".bench-results/perf-results-${{ matrix.label }}.json" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload ${{ matrix.display_name }} Perf Result Snapshot
        id: upload_perf_result_snapshot_1
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ matrix.label }}
          path: .bench-results/perf-results-${{ matrix.label }}.json
          overwrite: true
          if-no-files-found: error

      - name: Wait Before Retrying ${{ matrix.display_name }} Perf Result Snapshot Upload
        if: always() && steps.upload_perf_result_snapshot_1.outcome != 'success'
        run: sleep 15

      - name: Retry Upload ${{ matrix.display_name }} Perf Result Snapshot
        id: upload_perf_result_snapshot_2
        if: always() && steps.upload_perf_result_snapshot_1.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ matrix.label }}
          path: .bench-results/perf-results-${{ matrix.label }}.json
          overwrite: true
          if-no-files-found: error

      - name: Wait Before Retrying ${{ matrix.display_name }} Perf Result Snapshot Upload Again
        if: always() && steps.upload_perf_result_snapshot_1.outcome != 'success' && steps.upload_perf_result_snapshot_2.outcome != 'success'
        run: sleep 45

      - name: Retry Upload ${{ matrix.display_name }} Perf Result Snapshot Again
        id: upload_perf_result_snapshot_3
        if: always() && steps.upload_perf_result_snapshot_1.outcome != 'success' && steps.upload_perf_result_snapshot_2.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ matrix.label }}
          path: .bench-results/perf-results-${{ matrix.label }}.json
          overwrite: true
          if-no-files-found: error

      - name: Fail On ${{ matrix.display_name }} Perf Result Snapshot Upload Errors
        if: always() && steps.upload_perf_result_snapshot_1.outcome != 'success' && steps.upload_perf_result_snapshot_2.outcome != 'success' && steps.upload_perf_result_snapshot_3.outcome != 'success'
        run: |
          echo "${{ matrix.display_name }} perf result snapshot upload failed after 3 attempts" >&2
          exit 1

      - name: Upload ${{ matrix.display_name }} Perf Artifacts
        id: upload_perf_artifacts_1
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts-${{ matrix.label }}
          path: |
            .bench-results/${{ matrix.label }}/*.json
            .bench-results/${{ matrix.label }}/*.txt
            .bench-results/${{ matrix.label }}/*.log
            .bench-results/${{ matrix.label }}/*.flamegraph.svg
            .bench-results/${{ matrix.label }}/*.perf.log
            .bench-results/${{ matrix.label }}/*.stats.jsonl
            .bench-results/${{ matrix.label }}/*.profile.status
          include-hidden-files: true
          overwrite: true
          if-no-files-found: warn

      - name: Wait Before Retrying ${{ matrix.display_name }} Perf Artifact Upload
        if: always() && steps.upload_perf_artifacts_1.outcome != 'success'
        run: sleep 15

      - name: Retry Upload ${{ matrix.display_name }} Perf Artifacts
        id: upload_perf_artifacts_2
        if: always() && steps.upload_perf_artifacts_1.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts-${{ matrix.label }}
          path: |
            .bench-results/${{ matrix.label }}/*.json
            .bench-results/${{ matrix.label }}/*.txt
            .bench-results/${{ matrix.label }}/*.log
            .bench-results/${{ matrix.label }}/*.flamegraph.svg
            .bench-results/${{ matrix.label }}/*.perf.log
            .bench-results/${{ matrix.label }}/*.stats.jsonl
            .bench-results/${{ matrix.label }}/*.profile.status
          include-hidden-files: true
          overwrite: true
          if-no-files-found: warn

      - name: Wait Before Retrying ${{ matrix.display_name }} Perf Artifact Upload Again
        if: always() && steps.upload_perf_artifacts_1.outcome != 'success' && steps.upload_perf_artifacts_2.outcome != 'success'
        run: sleep 45

      - name: Retry Upload ${{ matrix.display_name }} Perf Artifacts Again
        id: upload_perf_artifacts_3
        if: always() && steps.upload_perf_artifacts_1.outcome != 'success' && steps.upload_perf_artifacts_2.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts-${{ matrix.label }}
          path: |
            .bench-results/${{ matrix.label }}/*.json
            .bench-results/${{ matrix.label }}/*.txt
            .bench-results/${{ matrix.label }}/*.log
            .bench-results/${{ matrix.label }}/*.flamegraph.svg
            .bench-results/${{ matrix.label }}/*.perf.log
            .bench-results/${{ matrix.label }}/*.stats.jsonl
            .bench-results/${{ matrix.label }}/*.profile.status
          include-hidden-files: true
          overwrite: true
          if-no-files-found: warn

      - name: Fail On ${{ matrix.display_name }} Perf Artifact Upload Errors
        if: always() && steps.upload_perf_artifacts_1.outcome != 'success' && steps.upload_perf_artifacts_2.outcome != 'success' && steps.upload_perf_artifacts_3.outcome != 'success'
        run: |
          echo "${{ matrix.display_name }} perf artifact upload failed after 3 attempts" >&2
          exit 1

      - name: Fail On ${{ matrix.display_name }} Perf Errors
        if: always()
        run: |
          if [ "${{ steps.run_perf.outcome }}" != "success" ]; then
            echo "${{ matrix.display_name }} perf step finished with outcome: ${{ steps.run_perf.outcome }}" >&2
            exit 1
          fi

  publish-perf-results:
    name: Publish Perf Results
    runs-on: ubuntu-latest
    needs:
      - perf-config
      - perf-impl
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Perf Result Snapshots
        if: needs.perf-config.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: perf-results-*
          path: .bench-results/downloaded
          merge-multiple: true

      - name: Download Perf Run Artifacts
        if: needs.perf-config.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: perf-artifacts-*
          path: .bench-results/downloaded-artifacts

      - name: Merge Perf Result Snapshots
        if: needs.perf-config.result == 'success'
        run: |
          python3 scripts/render-perf-comparison.py \
            --manifest coquic=.bench-results/downloaded/perf-results-coquic.json \
            --manifest coquic-rust=.bench-results/downloaded/perf-results-coquic-rust.json \
            --manifest coquic-python=.bench-results/downloaded/perf-results-coquic-python.json \
            --manifest coquic-go=.bench-results/downloaded/perf-results-coquic-go.json \
            --manifest coquic-js=.bench-results/downloaded/perf-results-coquic-js.json \
            --manifest quic-go=.bench-results/downloaded/perf-results-quic-go.json \
            --manifest quinn=.bench-results/downloaded/perf-results-quinn.json \
            --manifest picoquic=.bench-results/downloaded/perf-results-picoquic.json \
            --manifest msquic=.bench-results/downloaded/perf-results-msquic.json \
            --manifest quiche=.bench-results/downloaded/perf-results-quiche.json \
            --manifest quicly=.bench-results/downloaded/perf-results-quicly.json \
            --manifest google-quiche=.bench-results/downloaded/perf-results-google-quiche.json \
            --manifest tquic=.bench-results/downloaded/perf-results-tquic.json \
            --manifest mvfst=.bench-results/downloaded/perf-results-mvfst.json \
            --manifest s2n-quic=.bench-results/downloaded/perf-results-s2n-quic.json \
            --manifest xquic=.bench-results/downloaded/perf-results-xquic.json \
            --manifest aioquic=.bench-results/downloaded/perf-results-aioquic.json \
            --manifest ngtcp2=.bench-results/downloaded/perf-results-ngtcp2.json \
            --manifest lsquic=.bench-results/downloaded/perf-results-lsquic.json \
            --manifest neqo=.bench-results/downloaded/perf-results-neqo.json \
            --event-name "${GITHUB_EVENT_NAME}" \
            --commit "${GITHUB_SHA}" \
            --json-out .bench-results/perf-results.json >> "${GITHUB_STEP_SUMMARY}"
          rm -rf .bench-results/perf-artifacts
          mkdir -p .bench-results/perf-artifacts
          for artifact_dir in .bench-results/downloaded-artifacts/perf-artifacts-*; do
            [ -d "${artifact_dir}" ] || continue
            label="${artifact_dir##*/perf-artifacts-}"
            find "${artifact_dir}" \
              -maxdepth 1 \
              -type f \
              \( -name '*.flamegraph.svg' -o -name '*.perf.log' -o -name '*.stats.jsonl' \) \
              -print0 |
              while IFS= read -r -d '' file; do
                install -D -m 644 "${file}" ".bench-results/perf-artifacts/${label}/$(basename "${file}")"
              done
          done

      - name: Configure Demo SSH
        if: github.ref == 'refs/heads/main' && needs.perf-config.result == 'success' && needs.perf-impl.result == 'success'
        env:
          COQUIC_DEMO_REMOTE_SSH_KEY: ${{ secrets.COQUIC_DEMO_REMOTE_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "${COQUIC_DEMO_REMOTE_SSH_KEY}" > "${RUNNER_TEMP}/coquic-demo.key"
          cat > "${HOME}/.ssh/known_hosts" <<'EOF'
          coquic.minhuw.dev ssh-rsa 
          coquic.minhuw.dev ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCjTT5KdjyCQ3G04Z8mUUOkXAqsdDuU4K5bB3jXi5B3aIzYK+2f0TT0XE3G0/r/KmZoSHYxb21TtjykFa47XFSA=
          coquic.minhuw.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILi5VjtrGcYlzyYEXd4/PzQJXBjZ028DA6nJ7Xu50CJh
          EOF
          chmod 600 "${RUNNER_TEMP}/coquic-demo.key" "${HOME}/.ssh/known_hosts"

      - name: Upload Perf Results To Demo
        if: github.ref == 'refs/heads/main' && needs.perf-config.result == 'success' && needs.perf-impl.result == 'success'
        run: |
          if [ ! -f .bench-results/perf-results.json ]; then
            echo "missing .bench-results/perf-results.json" >&2
            exit 1
          fi
          mkdir -p .bench-results/history
          rm -rf .bench-results/perf-history
          ssh \
            -p 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            minhuw@coquic.minhuw.dev \
            "if sudo test -f /opt/coquic-demo/current/app/public/perf-history/index.json; then sudo cat /opt/coquic-demo/current/app/public/perf-history/index.json; fi" \
            > .bench-results/history/index.json
          if [ ! -s .bench-results/history/index.json ]; then
            ssh \
              -p 22 \
              -i "${RUNNER_TEMP}/coquic-demo.key" \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
              minhuw@coquic.minhuw.dev \
              "if sudo test -f /opt/coquic-demo/current/app/public/perf-history.json; then sudo cat /opt/coquic-demo/current/app/public/perf-history.json; fi" \
              > .bench-results/history/perf-history.json
          fi
          python3 scripts/update-perf-history.py \
            --snapshot .bench-results/perf-results.json \
            --history-index .bench-results/history/index.json \
            --history .bench-results/history/perf-history.json \
            --out-dir .bench-results/perf-history \
            --run-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          tar -C .bench-results/perf-history -cf .bench-results/perf-history.tar .
          tar -C .bench-results -cf .bench-results/perf-artifacts.tar perf-artifacts
          scp \
            -P 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            .bench-results/perf-results.json \
            minhuw@coquic.minhuw.dev:/tmp/coquic-perf-results.json
          scp \
            -P 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            .bench-results/perf-history.tar \
            minhuw@coquic.minhuw.dev:/tmp/coquic-perf-history.tar
          scp \
            -P 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            .bench-results/perf-artifacts.tar \
            minhuw@coquic.minhuw.dev:/tmp/coquic-perf-artifacts.tar
          ssh \
            -p 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            minhuw@coquic.minhuw.dev \
            "set -eu
            history_dir=/opt/coquic-demo/current/app/public/perf-history
            artifacts_dir=/opt/coquic-demo/current/app/public/perf-artifacts
            tmp_history=\$(mktemp -d)
            tmp_artifacts=\$(mktemp -d)
            trap 'rm -rf \"\${tmp_history}\" \"\${tmp_artifacts}\"' EXIT
            tar -xf /tmp/coquic-perf-history.tar -C \"\${tmp_history}\"
            tar -xf /tmp/coquic-perf-artifacts.tar -C \"\${tmp_artifacts}\"
            sudo install -d -m 755 \"\${history_dir}\"
            sudo rm -rf \"\${artifacts_dir}\"
            sudo install -d -m 755 \"\${artifacts_dir}\"
            if [ -d \"\${tmp_artifacts}/perf-artifacts\" ]; then
              sudo cp -a \"\${tmp_artifacts}/perf-artifacts/.\" \"\${artifacts_dir}/\"
            fi
            for file in \"\${tmp_history}\"/*.json; do
              [ -f \"\${file}\" ] || continue
              sudo install -m 644 \"\${file}\" \"\${history_dir}/\"
            done
            if [ -f \"\${tmp_history}/.keep.txt\" ]; then
              sudo find \"\${history_dir}\" -maxdepth 1 -type f -name '*.json' ! -name 'index.json' -print |
                while IFS= read -r file; do
                  base=\$(basename \"\${file}\")
                  if ! grep -Fxq -- \"\${base}\" \"\${tmp_history}/.keep.txt\"; then
                    sudo rm -f -- \"\${file}\"
                  fi
                done
            fi
            sudo install -m 644 /tmp/coquic-perf-results.json /opt/coquic-demo/current/app/public/perf-results.json
            sudo rm -f /opt/coquic-demo/current/app/public/perf-history.json
            sudo systemctl restart coquic-demo.service
            sudo systemctl is-active --quiet coquic-demo.service
            rm -f /tmp/coquic-perf-results.json /tmp/coquic-perf-history.tar /tmp/coquic-perf-artifacts.tar"

      - name: Verify Published Perf Results
        if: github.ref == 'refs/heads/main' && needs.perf-config.result == 'success' && needs.perf-impl.result == 'success'
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          base = "https://coquic.minhuw.dev"
          expected_commit = os.environ["GITHUB_SHA"]
          latest_snapshot_path = None
          last_error = None

          for _ in range(30):
              try:
                  profiles_ok = 0
                  with urllib.request.urlopen(f"{base}/perf-results.json", timeout=15) as response:
                      results = json.load(response)
                  with urllib.request.urlopen(f"{base}/perf-history/index.json", timeout=15) as response:
                      index = json.load(response)
                  if results.get("commit") != expected_commit:
                      raise RuntimeError(
                          f"perf-results.json has commit {results.get('commit')}, expected {expected_commit}"
                      )
                  snapshots = index.get("snapshots")
                  if not isinstance(snapshots, list) or not snapshots:
                      raise RuntimeError("perf-history/index.json has no snapshots")
                  latest = snapshots[-1]
                  latest_snapshot_path = latest.get("path")
                  if not isinstance(latest_snapshot_path, str) or not latest_snapshot_path.endswith(".json"):
                      raise RuntimeError("perf-history latest snapshot path is invalid")
                  with urllib.request.urlopen(f"{base}/perf-history/{latest_snapshot_path}", timeout=15) as response:
                      snapshot = json.load(response)
                  if snapshot.get("commit") != expected_commit:
                      raise RuntimeError(
                          f"latest perf-history snapshot has commit {snapshot.get('commit')}, expected {expected_commit}"
                      )
                  sample_svg_path = None
                  for row in results.get("rows", []):
                      for profile in (row.get("profiles") or {}).values():
                          if profile.get("status") == "ok":
                              profiles_ok += 1
                              if sample_svg_path is None:
                                  sample_svg_path = profile.get("svg_file")
                  if profiles_ok == 0:
                      raise RuntimeError("published perf results contain no successful flamegraph profiles")
                  if not isinstance(sample_svg_path, str) or not sample_svg_path.endswith(".svg"):
                      raise RuntimeError("published perf results do not reference a flamegraph SVG")
                  with urllib.request.urlopen(f"{base}/perf-artifacts/{sample_svg_path}", timeout=15) as response:
                      sample = response.read(4096)
                  if response.status != 200 or b"<svg" not in sample:
                      raise RuntimeError(f"published flamegraph SVG is not readable: {sample_svg_path}")
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          else:
              print(f"published perf verification failed: {last_error}", file=sys.stderr)
              sys.exit(1)

          print(f"verified published perf results: latest_snapshot={latest_snapshot_path}, ok_profiles={profiles_ok}, sample_svg={sample_svg_path}")
          PY

      - name: Fail On Perf Job Errors
        if: always()
        run: |
          failed=0
          check_job() {
            local label="$1"
            local result="$2"
            if [ "${result}" != "success" ]; then
              echo "${label} job finished with result: ${result}" >&2
              failed=1
            fi
          }
          check_job "perf-config" "${{ needs.perf-config.result }}"
          check_job "perf-impl" "${{ needs.perf-impl.result }}"
          exit "${failed}"

      - name: Upload Perf Artifacts
        id: upload_perf_results_1
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: quic-perf-results
          path: .bench-results
          include-hidden-files: true
          overwrite: true
          if-no-files-found: warn

      - name: Wait Before Retrying Perf Artifact Upload
        if: always() && steps.upload_perf_results_1.outcome != 'success'
        run: sleep 15

      - name: Retry Upload Perf Artifacts
        id: upload_perf_results_2
        if: always() && steps.upload_perf_results_1.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: quic-perf-results
          path: .bench-results
          include-hidden-files: true
          overwrite: true
          if-no-files-found: warn

      - name: Wait Before Retrying Perf Artifact Upload Again
        if: always() && steps.upload_perf_results_1.outcome != 'success' && steps.upload_perf_results_2.outcome != 'success'
        run: sleep 45

      - name: Retry Upload Perf Artifacts Again
        id: upload_perf_results_3
        if: always() && steps.upload_perf_results_1.outcome != 'success' && steps.upload_perf_results_2.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: quic-perf-results
          path: .bench-results
          include-hidden-files: true
          overwrite: true
          if-no-files-found: warn

      - name: Fail On Perf Artifact Upload Errors
        if: always() && steps.upload_perf_results_1.outcome != 'success' && steps.upload_perf_results_2.outcome != 'success' && steps.upload_perf_results_3.outcome != 'success'
        run: |
          echo "perf artifact upload failed after 3 attempts" >&2
          exit 1

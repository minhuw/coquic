name: Test

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Build / Test / Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build
        run: nix develop -c zig build

      - name: Test With Coverage
        run: nix develop -c zig build coverage

      - name: Render Coverage Summary
        run: |
          python3 scripts/render-coverage-summary.py \
            --lcov coverage/lcov.info \
            --report-url https://coquic.minhuw.dev/coverage/index.html \
            --event-name "${GITHUB_EVENT_NAME}" \
            --commit "${GITHUB_SHA}" \
            --json-out coverage/coverage-results.json >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          use_oidc: true

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-coverage
          path: |
            coverage/html
            coverage/lcov.info
            coverage/coverage-results.json
          if-no-files-found: warn

      - name: Configure Demo SSH
        if: github.ref == 'refs/heads/main' && success()
        env:
          COQUIC_DEMO_REMOTE_SSH_KEY: ${{ secrets.COQUIC_DEMO_REMOTE_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s' "${COQUIC_DEMO_REMOTE_SSH_KEY}" > "${RUNNER_TEMP}/coquic-demo.key"
          cat > "${HOME}/.ssh/known_hosts" <<'EOF'
          coquic.minhuw.dev ssh-rsa 
          coquic.minhuw.dev ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCjTT5KdjyCQ3G04Z8mUUOkXAqsdDuU4K5bB3jXi5B3aIzYK+2f0TT0XE3G0/r/KmZoSHYxb21TtjykFa47XFSA=
          coquic.minhuw.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILi5VjtrGcYlzyYEXd4/PzQJXBjZ028DA6nJ7Xu50CJh
          EOF
          chmod 600 "${RUNNER_TEMP}/coquic-demo.key" "${HOME}/.ssh/known_hosts"

      - name: Upload Coverage Report To Demo
        if: github.ref == 'refs/heads/main' && success()
        run: |
          if [ ! -f coverage/coverage-results.json ]; then
            echo "missing coverage/coverage-results.json" >&2
            exit 1
          fi
          if [ ! -f coverage/html/index.html ]; then
            echo "missing coverage/html/index.html" >&2
            exit 1
          fi
          tar -C coverage/html -czf coverage-html.tar.gz .
          scp \
            -P 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            coverage/coverage-results.json \
            minhuw@coquic.minhuw.dev:/tmp/coquic-coverage-results.json
          scp \
            -P 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            coverage-html.tar.gz \
            minhuw@coquic.minhuw.dev:/tmp/coquic-coverage-html.tar.gz
          ssh \
            -p 22 \
            -i "${RUNNER_TEMP}/coquic-demo.key" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            minhuw@coquic.minhuw.dev \
            "sudo install -m 644 /tmp/coquic-coverage-results.json /opt/coquic-demo/current/site/coverage-results.json && sudo rm -rf /opt/coquic-demo/current/site/coverage && sudo install -d -m 755 /opt/coquic-demo/current/site/coverage && sudo tar --no-same-owner -xzf /tmp/coquic-coverage-html.tar.gz -C /opt/coquic-demo/current/site/coverage && rm -f /tmp/coquic-coverage-results.json /tmp/coquic-coverage-html.tar.gz"
